<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 – All Topics</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: #ff4757;
            --p2: #ffa502;
            --board: #1e90ff;
            --bg: #e8f4fd;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg);
            margin: 0;
            padding: 20px 10px 40px;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #1e3a5f;
            margin: 0 0 14px;
            letter-spacing: 1px;
        }

        .status-bar {
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            padding: 10px 36px;
            border-radius: 50px;
            margin-bottom: 18px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            transition: all 0.3s;
        }
        .p1-turn { color: var(--p1); border: 4px solid var(--p1); }
        .p2-turn { color: var(--p2); border: 4px solid var(--p2); }

        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--board);
            padding: 12px;
            border-radius: 20px;
            gap: 8px;
            box-shadow: 0 10px 0 #0972d4, 0 12px 30px rgba(0,0,0,0.2);
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .column-numbers {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 0 12px;
            margin-bottom: 6px;
            width: 100%;
        }

        .col-num {
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            color: #1e3a5f;
            text-align: center;
            background: white;
            border-radius: 12px;
            padding: 4px 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
            line-height: 1.2;
            transition: transform 0.15s, background 0.15s;
            cursor: pointer;
            user-select: none;
        }
        .col-num:hover {
            background: #fffbe6;
            transform: translateY(-3px);
        }
        .col-num.full {
            color: #ccc;
            background: #f0f0f0;
            cursor: not-allowed;
            transform: none;
        }

        .column {
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            cursor: pointer;
            padding: 4px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .column:hover { background: rgba(255,255,255,0.15); }

        .slot {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: #d6eaff;
            border: 3px solid rgba(0,0,0,0.08);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.15);
        }

        .slot.red   { background: var(--p1) !important; box-shadow: 0 0 12px rgba(255,71,87,0.6), inset 0 -3px 6px rgba(0,0,0,0.2); }
        .slot.yellow{ background: var(--p2) !important; box-shadow: 0 0 12px rgba(255,165,2,0.6), inset 0 -3px 6px rgba(0,0,0,0.2); }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,20,50,0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        #q-card {
            background: white;
            padding: 36px 40px 32px;
            border-radius: 28px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            border: 6px solid var(--board);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .player-badge {
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 14px;
            color: white;
        }
        .badge-red    { background: var(--p1); }
        .badge-yellow { background: var(--p2); }

        #q-topic-label {
            font-family: 'Fredoka One', cursive;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #q-text {
            font-family: 'Nunito', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            color: #1e3a5f;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        #q-translation {
            font-size: 1.15rem;
            color: #5a7a9a;
            margin-bottom: 22px;
            min-height: 28px;
            font-style: italic;
            transition: opacity 0.3s;
        }

        .question-icon {
            margin: 10px 0;
            animation: bounce 2s infinite;
        }

        .question-icon img {
            width: 180px;
            height: 140px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #e0e0e0;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .translate-btn {
            background: none;
            border: 2px solid #aac4e0;
            color: #4a7aaa;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .translate-btn:hover { background: #e8f4fd; border-color: #1e90ff; color: #1e90ff; }

        .judge-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

        .btn {
            padding: 14px 28px;
            font-size: 1.1rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }
        .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
        .btn-yes { background: #2ecc71; color: white; }
        .btn-no  { background: #e0e0e0; color: #555; }

        /* Win overlay */
        #win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,20,50,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        #win-card {
            background: white;
            padding: 50px 60px;
            border-radius: 30px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #win-card h2 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin: 0 0 10px; }
        #win-card p  { font-size: 1.3rem; color: #555; margin-bottom: 20px; }
        .win-icons { font-size: 2rem; margin-bottom: 20px; }
        .btn-restart { background: var(--board); color: white; padding: 16px 40px; font-size: 1.2rem; }

        /* Selector bars */
        .selector-bar {
            display: flex;
            gap: 0;
            margin-bottom: 12px;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            border: 3px solid var(--board);
            flex-wrap: wrap;
        }
        .sel-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            background: white;
            color: #888;
        }
        .sel-btn:hover { background: #e8f4fd; }
        .sel-btn.active {
            background: var(--board);
            color: white;
        }

        .difficulty-bar {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            border: 3px solid #2ecc71;
        }
        .diff-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            padding: 10px 22px;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            background: white;
            color: #888;
        }
        .diff-btn:hover { background: #e8fdf0; }
        .diff-btn.active {
            background: #2ecc71;
            color: white;
        }

        .qr-sidebar {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            padding: 14px;
            border-radius: 18px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 100;
        }
        .qr-sidebar img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
        }
        .qr-sidebar p {
            margin: 8px 0 0;
            font-family: 'Fredoka One', cursive;
            font-size: 0.75rem;
            color: #1e3a5f;
        }

        @keyframes pieceDrop {
            from { transform: translateY(var(--drop-y)); }
            to   { transform: translateY(0); }
        }
        .slot.dropping { animation: pieceDrop 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .board { overflow: hidden; }
        .how-to-play {
            position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
            background: white; border-radius: 20px; padding: 18px 16px; width: 170px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.14); border: 3px solid var(--board);
            z-index: 100; font-family: 'Nunito', sans-serif;
        }
        .htp-title { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--board); text-align: center; margin-bottom: 12px; border-bottom: 2px solid var(--board); padding-bottom: 8px; }
        .htp-step { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 0.78rem; font-weight: 700; color: #2c3e50; line-height: 1.35; }
        .htp-num { background: var(--board); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One', cursive; font-size: 0.8rem; flex-shrink: 0; }
        .htp-mini-board { display: grid; grid-template-columns: repeat(4, 14px); gap: 3px; background: var(--board); padding: 4px; border-radius: 6px; margin: 8px auto 4px; width: fit-content; }
        .htp-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.25); }
        .htp-dot.r { background: #ff4757; }
        .htp-dot.y { background: #ffa502; }
        .htp-legend { display: flex; gap: 8px; justify-content: center; margin-top: 10px; font-size: 0.75rem; font-weight: 800; }
        @media (max-width: 560px) {
            .slot { width: 40px; height: 40px; }
            .board { gap: 5px; padding: 8px; }
            #q-text { font-size: 1.3rem; }
            .sel-btn { font-size: 0.85rem; padding: 8px 14px; }
            .diff-btn { font-size: 0.85rem; padding: 8px 14px; }
            .qr-sidebar { position: static; transform: none; margin-top: 20px; }
            .how-to-play { display: none; }
        }
    </style>
</head>
<body>

<h1>🎮 Connect 4 – All Topics</h1>

<!-- Topic Selector -->
<div class="selector-bar" id="topic-bar">
    <button class="sel-btn active" onclick="setTopic('all')">🎲 All Topics</button>
    <button class="sel-btn" onclick="setTopic('jobs')">💼 Jobs</button>
    <button class="sel-btn" onclick="setTopic('habits')">🏠 Habits</button>
    <button class="sel-btn" onclick="setTopic('pastcont')">⏪ Past Continuous</button>
</div>

<!-- Image Category Selector (for Jobs topic) -->
<div class="selector-bar" id="image-bar">
    <button class="sel-btn active" onclick="setImageSet('all')">🖼️ All Images</button>
    <button class="sel-btn" onclick="setImageSet('jobs')">💼 Jobs</button>
    <button class="sel-btn" onclick="setImageSet('animals')">🐾 Animals</button>
    <button class="sel-btn" onclick="setImageSet('classroom')">🏫 Classroom</button>
    <button class="sel-btn" onclick="setImageSet('clothes')">👕 Clothes</button>
    <button class="sel-btn" onclick="setImageSet('family')">👨‍👩‍👧 Family</button>
    <button class="sel-btn" onclick="setImageSet('food')">🍔 Food</button>
    <button class="sel-btn" onclick="setImageSet('places')">🏙️ Places</button>
    <button class="sel-btn" onclick="setImageSet('sports')">⚽ Sports</button>
    <button class="sel-btn" onclick="setImageSet('transport')">🚗 Transport</button>
    <button class="sel-btn" onclick="setImageSet('weather')">🌤️ Weather</button>
</div>

<!-- Difficulty (shown for jobs-style image questions) -->
<div class="difficulty-bar" id="diff-bar">
    <button class="diff-btn active" id="btn-easy" onclick="setDifficulty('easy')">⭐ Easy — Name It</button>
    <button class="diff-btn" id="btn-hard" onclick="setDifficulty('hard')">🔥 Hard — Answer a Question</button>
</div>

<div id="status" class="status-bar p1-turn">🔴 Red Player's Turn</div>

<div class="board-wrapper">
    <div class="column-numbers" id="col-nums">
        <div class="col-num" onclick="handleColumnClick(0)">1</div>
        <div class="col-num" onclick="handleColumnClick(1)">2</div>
        <div class="col-num" onclick="handleColumnClick(2)">3</div>
        <div class="col-num" onclick="handleColumnClick(3)">4</div>
        <div class="col-num" onclick="handleColumnClick(4)">5</div>
        <div class="col-num" onclick="handleColumnClick(5)">6</div>
        <div class="col-num" onclick="handleColumnClick(6)">7</div>
    </div>
    <div class="board" id="board"></div>
</div>

<!-- Question Overlay -->
<div id="overlay">
    <div id="q-card">
        <div id="player-badge" class="player-badge badge-red">🔴 Red's Question</div>
        <div id="q-topic-label"></div>
        <div id="q-text">Question goes here...</div>
        <div id="q-translation"></div>
        <div class="question-icon" id="question-icon" style="display:none;"><img id="q-image" src="" alt="Question image"></div>
        <button class="translate-btn" id="translate-btn" onclick="toggleTranslation()">🇹🇭 Show Thai Translation</button>
        <div class="judge-btns">
            <button class="btn btn-no"  onclick="handleJudge(false)">❌ Try Again</button>
            <button class="btn btn-yes" onclick="handleJudge(true)">✅ Great Answer!</button>
        </div>
    </div>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
    <div id="win-card">
        <h2 id="win-title">🎉 Red Wins!</h2>
        <p>Fantastic playing — well done!</p>
        <div class="win-icons">
            <span>🏆</span>
            <span>🌟</span>
            <span>🎓</span>
        </div>
        <button class="btn btn-restart" onclick="location.reload()">🔄 Play Again</button>
    </div>
</div>

<div class="how-to-play">
    <div class="htp-title">How to Play</div>
    <div class="htp-step"><div class="htp-num">1</div><div class="htp-text" data-en="Pick a column (1-7)" data-th="เลือกคอลัมน์ (1-7)">Pick a column (1-7)</div></div>
    <div class="htp-step"><div class="htp-num">2</div><div class="htp-text" data-en="Answer correctly" data-th="ตอบให้ถูกต้อง">Answer correctly</div></div>
    <div class="htp-step"><div class="htp-num">3</div><div class="htp-text" data-en="Piece drops in!" data-th="ชิ้นส่วนตกลงไป!">Piece drops in!</div></div>
    <div class="htp-step"><div class="htp-num">4</div><div class="htp-text" data-en="Connect 4 to win!" data-th="เชื่อม 4 ชิ้นเพื่อชนะ!">Connect 4 to win!</div></div>
    <button onclick="htpToggleLang(this)" style="margin-top:8px;width:100%;padding:5px;border-radius:10px;border:2px solid var(--board);background:white;font-family:'Fredoka One',cursive;font-size:0.8rem;color:var(--board);cursor:pointer;">Thai</button>
    <div class="htp-mini-board">
        <div class="htp-dot"></div><div class="htp-dot"></div><div class="htp-dot r"></div><div class="htp-dot"></div>
        <div class="htp-dot"></div><div class="htp-dot r"></div><div class="htp-dot y"></div><div class="htp-dot"></div>
        <div class="htp-dot r"></div><div class="htp-dot y"></div><div class="htp-dot y"></div><div class="htp-dot"></div>
        <div class="htp-dot r"></div><div class="htp-dot r"></div><div class="htp-dot r"></div><div class="htp-dot r"></div>
    </div>
    <div class="htp-legend"><span>Red</span><span>Yellow</span></div>
</div>
<div class="qr-sidebar">
    <img src="../overlays/teacherlewis1-overlay/public/qrcode_preply.com.png" alt="Preply QR Code">
    <p>Book a lesson!</p>
</div>

<script>
    const ROWS = 6, COLS = 7;
    let currentPlayer = 1;
    let boardState = Array(COLS).fill(null).map(() => Array(ROWS).fill(null));
    let activeCol = null;
    let translationVisible = false;
    let currentTranslation = '';
    let selectedTopic = 'all';
    let selectedImageSet = 'all';
    let difficulty = 'easy';

    // ─── IMAGE DATA BY CATEGORY ───────────────────────────────────────────
    // Each category has: folder path, and an array of { file, name, nameTh, g, q, qTh }
    // Add images to any category — they will automatically appear in the game.

    const imageCategories = {

                { file: 'imgi_2_1479446345_10_images-2.jpg',   name: 'Bus Driver',      nameTh: 'คนขับรถเมล์',          g: 'she', q: 'Where does a bus driver work?',                  qTh: 'คนขับรถเมล์ทำงานที่ไหน?', ans: 'On a bus and on the road', ansTh: 'บนรถเมล์และบนถนน', emoji: '🚌' },
                { file: 'imgi_3_1479446367_11_images-3.jpg',   name: 'Cleaner',         nameTh: 'คนทำความสะอาด',        g: 'she', q: 'What tools does a cleaner use?',                 qTh: 'คนทำความสะอาดใช้เครื่องมืออะไรบ้าง?', ans: 'A mop, broom, and vacuum cleaner', ansTh: 'ไม้ถูพื้น ไม้กวาด และเครื่องดูดฝุ่น', emoji: '🧹' },
                { file: 'imgi_4_1479446389_6_images-4.jpg',    name: 'Dancer',          nameTh: 'นักเต้น',              g: 'she', q: 'Where does a dancer perform?',                   qTh: 'นักเต้นแสดงที่ไหน?', ans: 'On a stage, in theatres, or in music videos', ansTh: 'บนเวที ในโรงละคร หรือในมิวสิกวิดีโอ', emoji: '💃' },
                { file: 'imgi_5_1479446405_9_images.jpg',      name: 'Chef',            nameTh: 'พ่อครัว',              g: 'he',  q: 'What does a chef cook?',                         qTh: 'พ่อครัวทำอาหารอะไร?', ans: 'Delicious food and meals in a restaurant', ansTh: 'อาหารอร่อยๆ ในร้านอาหาร', emoji: '👨‍🍳' },
                { file: 'imgi_6_1479446423_8_imgres-1.jpg',    name: 'Nurse',           nameTh: 'พยาบาล',               g: 'she', q: 'Where does a nurse work?',                       qTh: 'พยาบาลทำงานที่ไหน?', ans: 'In a hospital or clinic helping doctors', ansTh: 'ในโรงพยาบาลหรือคลินิกช่วยเหลือคุณหมอ', emoji: '👩‍⚕️' },
                { file: 'imgi_7_1479446441_7_imgres-2.jpg',    name: 'Police Officer',  nameTh: 'ตำรวจ',                g: 'he',  q: 'What does a police officer do?',                 qTh: 'ตำรวจทำหน้าที่อะไร?', ans: 'Protect people and catch criminals', ansTh: 'ปกป้องผู้คนและจับอาชญากร', emoji: '👮' },

            { en: "What were you doing when the electricity went out last time?",          th: "ครั้งล่าสุดที่ไฟดับคุณกำลังทำอะไรอยู่?" },
            { en: "Was the sun shining when you left home this morning?",                  th: "แดดกำลังออกอยู่ไหมตอนที่คุณออกจากบ้านเช้านี้?" },
            { en: "What were you and your family doing at dinner time yesterday?",         th: "เมื่อวานตอนเวลาอาหารเย็นคุณและครอบครัวกำลังทำอะไรอยู่?" },
            { en: "Were you walking or riding to school this morning?",                    th: "เช้านี้คุณกำลังเดินหรือขี่รถมาโรงเรียน?" },
            { en: "What were the birds doing when you were waiting outside?",              th: "นกกำลังทำอะไรอยู่ตอนที่คุณกำลังรออยู่ข้างนอก?" },
            { en: "Was the shop closing when you arrived there last time?",                th: "ร้านกำลังปิดอยู่ไหมตอนที่คุณไปถึงครั้งล่าสุด?" },

            { en: "What was the weather doing when you looked outside at lunch?",          th: "ตอนเที่ยงพอมองออกไปข้างนอกอากาศเป็นยังไงอยู่?" },
            { en: "Were you helping anyone with something yesterday?",                     th: "เมื่อวานคุณกำลังช่วยใครทำอะไรอยู่ไหม?" },
            { en: "What was happening in the hallway when the bell rang?",                 th: "มีอะไรกำลังเกิดขึ้นในทางเดินตอนที่กระดิ่งดัง?" },

    // ─── BUILD POOLS ──────────────────────────────────────────────────────
    function getAllImages(setKey) {
        let pool = [];
        if (setKey === 'all') {
            for (const key of Object.keys(imageCategories)) {
                const cat = imageCategories[key];
                for (const item of cat.items) {
                    const base = cat.basePath !== undefined ? cat.basePath : IMG_BASE;
                    pool.push({ ...item, imgSrc: base + cat.path + item.file, category: cat.label });
                }
            }
        } else {
            const cat = imageCategories[setKey];
            if (cat) {
                for (const item of cat.items) {
                    const base = cat.basePath !== undefined ? cat.basePath : IMG_BASE;
                    pool.push({ ...item, imgSrc: base + cat.path + item.file, category: cat.label });
                }
            }
        }
        return pool;
    }

    function getTextPool(topicKey) {
        if (topicKey === 'all') {
            let pool = [];
            for (const key of Object.keys(textQuestions)) {
                pool = pool.concat(textQuestions[key].map(q => ({ ...q, topic: key })));
            }
            return pool;
        }
        return (textQuestions[topicKey] || []).map(q => ({ ...q, topic: topicKey }));
    }

    let imageDeck = [];
    let textDeck = [];

    function getNextImage() {
        if (imageDeck.length === 0) {
            imageDeck = getAllImages(selectedImageSet);
            imageDeck.sort(() => Math.random() - 0.5);
        }
        if (imageDeck.length === 0) return null;
        return imageDeck.pop();
    }

    function getNextText() {
        if (textDeck.length === 0) {
            textDeck = getTextPool(selectedTopic === 'jobs' ? 'all' : selectedTopic);
            textDeck.sort(() => Math.random() - 0.5);
        }
        if (textDeck.length === 0) return null;
        return textDeck.pop();
    }

    const topicLabels = { jobs: '💼 Jobs', habits: '🏠 Everyday Habits', pastcont: '⏪ Past Continuous', all: '🎲 All Topics' };

    // ─── SELECTORS ────────────────────────────────────────────────────────
    function setTopic(t) {
        selectedTopic = t;
        textDeck = [];
        imageDeck = [];
        document.querySelectorAll('#topic-bar .sel-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        // Show/hide difficulty bar (only relevant for image questions)
        updateDiffBarVisibility();
    }

    function setImageSet(s) {
        selectedImageSet = s;
        imageDeck = [];
        document.querySelectorAll('#image-bar .sel-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function setDifficulty(mode) {
        difficulty = mode;
        document.getElementById('btn-easy').classList.toggle('active', mode === 'easy');
        document.getElementById('btn-hard').classList.toggle('active', mode === 'hard');
    }

    function updateDiffBarVisibility() {
        const hasImages = getAllImages(selectedImageSet).length > 0;
        document.getElementById('diff-bar').style.display = hasImages ? 'flex' : 'none';
    }

    // ─── AUDIO ────────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.15);
        } else {
            osc.type = 'square';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        }
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    let columnItems = []; // Array of 7 items mapped to columns
    let textDeck = [];
    let imageDeck = [];

    function setupColumns() {
        const nums = document.querySelectorAll('.col-num');
        
        if (selectedTopic === 'habits' || selectedTopic === 'pastcont') {
            columnItems = [];
            nums.forEach((el, c) => {
                const emoji = selectedTopic === 'habits' ? '🏠' : '⏪';
                el.innerHTML = `${c + 1}<br>${emoji}`;
            });
            return;
        }

        const imagePool = getAllImages(selectedImageSet);
        if (imagePool.length >= 7) {
            // Shuffle and choose 7 unique items
            const indices = imagePool.map((_, i) => i).sort(() => Math.random() - 0.5);
            columnItems = indices.slice(0, 7).map(idx => imagePool[idx]);
            nums.forEach((el, c) => {
                const item = columnItems[c];
                const emoji = item.emoji || (item.type === 'animal' ? '🐾' : '💼');
                el.innerHTML = `${c + 1}<br>${emoji}`;
            });
        } else {
            columnItems = [];
            nums.forEach((el, c) => {
                el.innerHTML = `${c + 1}`;
            });
        }
    }

    function getNextImage() {
        if (imageDeck.length === 0) {
            imageDeck = getAllImages(selectedImageSet);
            imageDeck.sort(() => Math.random() - 0.5);
        }
        if (imageDeck.length === 0) return null;
        return imageDeck.pop();
    }

    function getNextText() {
        if (textDeck.length === 0) {
            textDeck = getTextPool(selectedTopic === 'jobs' ? 'all' : selectedTopic);
            textDeck.sort(() => Math.random() - 0.5);
        }
        if (textDeck.length === 0) return null;
        return textDeck.pop();
    }

    const topicLabels = { jobs: '💼 Jobs', habits: '🏠 Everyday Habits', pastcont: '⏪ Past Continuous', all: '🎲 All Topics' };

    // ─── SELECTORS ────────────────────────────────────────────────────────
    function setTopic(t) {
        selectedTopic = t;
        textDeck = [];
        imageDeck = [];
        document.querySelectorAll('#topic-bar .sel-btn').forEach(b => b.classList.remove('active'));
        if (event && event.target) event.target.classList.add('active');
        // Show/hide difficulty bar (only relevant for image questions)
        updateDiffBarVisibility();
        setupColumns();
    }

    function setImageSet(s) {
        selectedImageSet = s;
        imageDeck = [];
        document.querySelectorAll('#image-bar .sel-btn').forEach(b => b.classList.remove('active'));
        if (event && event.target) event.target.classList.add('active');
        setupColumns();
    }

    function setDifficulty(mode) {
        difficulty = mode;
        document.getElementById('btn-easy').classList.toggle('active', mode === 'easy');
        document.getElementById('btn-hard').classList.toggle('active', mode === 'hard');
    }

    function updateDiffBarVisibility() {
        const hasImages = getAllImages(selectedImageSet).length > 0;
        document.getElementById('diff-bar').style.display = hasImages ? 'flex' : 'none';
    }

    // ─── AUDIO ────────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.15);
        } else {
            osc.type = 'square';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        }
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    // ─── BOARD INIT ───────────────────────────────────────────────────────
    function init() {
        const board = document.getElementById('board');
        for (let c = 0; c < COLS; c++) {
            const colDiv = document.createElement('div');
            colDiv.className = 'column';
            colDiv.onclick = () => handleColumnClick(c);
            for (let r = 0; r < ROWS; r++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `slot-${c}-${r}`;
                colDiv.appendChild(slot);
            }
            board.appendChild(colDiv);
        }
        updateDiffBarVisibility();
        setupColumns();
    }

    function updateColumnNumbers() {
        const nums = document.querySelectorAll('.col-num');
        nums.forEach((el, c) => {
            if (boardState[c].indexOf(null) === -1) {
                el.classList.add('full');
            } else {
                el.classList.remove('full');
            }
        });
    }

    function handleColumnClick(c) {
        if (boardState[c].indexOf(null) === -1) return;
        activeCol = c;
        translationVisible = false;

        if (columnItems.length === 7) {
            showImageQuestionForItem(columnItems[c]);
        } else {
            showTextQuestion(c);
        }
    }

    function showImageQuestionForItem(img) {
        const iconEl = document.getElementById('question-icon');
        iconEl.style.display = 'block';
        document.getElementById('q-image').src = img.imgSrc;

        document.getElementById('q-topic-label').innerText = img.category;

        if (difficulty === 'easy') {
            if (img.type === 'animal') {
                document.getElementById('q-text').innerText = 'What animal is this?';
                const article = /^[aeiou]/i.test(img.name) ? 'an' : 'a';
                currentTranslation = "It's " + article + ' ' + img.name + ' — ' + img.nameTh;
            } else {
                const pronoun = img.g === 'he' ? 'he' : 'she';
                const Pronoun = img.g === 'he' ? 'He' : 'She';
                document.getElementById('q-text').innerText = 'What does ' + pronoun + ' do?';
                const article = /^[aeiou]/i.test(img.name) ? 'an' : 'a';
                currentTranslation = Pronoun + "'s " + article + ' ' + img.name + ' — ' + img.nameTh;
            }
        } else {
            document.getElementById('q-text').innerText = img.q;
            currentTranslation = "Answer: " + img.ans + " (" + img.ansTh + ")\n\nQuestion: " + img.qTh;
        }

        document.getElementById('q-translation').innerText = '';
        document.getElementById('translate-btn').innerText = difficulty === 'easy'
            ? '🇹🇭 Show Answer'
            : '🇹🇭 Show Answer & Translation';

        showBadge();
        document.getElementById('overlay').style.display = 'flex';
    }

    function showTextQuestion(c) {
        const q = getNextText();
        if (!q) return;

        document.getElementById('question-icon').style.display = 'none';
        const label = q.topic === 'habits' ? '🏠 Everyday Habits' : '⏪ Past Continuous';
        document.getElementById('q-topic-label').innerText = label;
        document.getElementById('q-text').innerText = q.en;
        currentTranslation = q.th;

        document.getElementById('q-translation').innerText = '';
        document.getElementById('translate-btn').innerText = '🇹🇭 Show Thai Translation';

        showBadge();
        document.getElementById('overlay').style.display = 'flex';
    }

    function showBadge() {
        const badge = document.getElementById('player-badge');
        badge.innerText = currentPlayer === 1 ? '🔴 Red\'s Question' : '🟡 Yellow\'s Question';
        badge.className = 'player-badge ' + (currentPlayer === 1 ? 'badge-red' : 'badge-yellow');
    }

    function toggleTranslation() {
        translationVisible = !translationVisible;
        document.getElementById('q-translation').innerText = translationVisible ? currentTranslation : '';
        const hideLabel = difficulty === 'easy' ? '🙈 Hide Answer' : '🙈 Hide Answer & Translation';
        const showLabel = difficulty === 'easy' ? '🇹🇭 Show Answer' : '🇹🇭 Show Answer & Translation';
        document.getElementById('translate-btn').innerText = translationVisible ? hideLabel : showLabel;
    }

    function handleJudge(isCorrect) {
        document.getElementById('overlay').style.display = 'none';
        if (!isCorrect) {
            playSound('wrong');
            return;
        }
        playSound('correct');
        const r = boardState[activeCol].indexOf(null);
        boardState[activeCol][r] = currentPlayer;
        const slot = document.getElementById(`slot-${activeCol}-${r}`);
        slot.style.setProperty('--drop-y', `-${(ROWS - r) * 74}px`);
        slot.className = `slot ${currentPlayer === 1 ? 'red' : 'yellow'} dropping`;
        slot.addEventListener('animationend', () => slot.classList.remove('dropping'), { once: true });
        updateColumnNumbers();

        if (checkWin(activeCol, r)) {
            setTimeout(() => showWin(currentPlayer), 300);
            return;
        }

        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateStatus();
    }

    function updateStatus() {
        const s = document.getElementById('status');
        s.innerText = currentPlayer === 1 ? '🔴 Red Player\'s Turn' : '🟡 Yellow Player\'s Turn';
        s.className = `status-bar ${currentPlayer === 1 ? 'p1-turn' : 'p2-turn'}`;
    }

    function showWin(player) {
        const title = document.getElementById('win-title');
        title.innerText = player === 1 ? '🎉 Red Wins!' : '🎉 Yellow Wins!';
        title.style.color = player === 1 ? '#ff4757' : '#ffa502';
        document.getElementById('win-overlay').style.display = 'flex';
    }

    function checkWin(c, r) {
        const p = boardState[c][r];
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (let [dc, dr] of dirs) {
            let count = 1;
            for (let i = 1; i < 4; i++) { if (boardState[c+dc*i]?.[r+dr*i] === p) count++; else break; }
            for (let i = 1; i < 4; i++) { if (boardState[c-dc*i]?.[r-dr*i] === p) count++; else break; }
            if (count >= 4) return true;
        }
        return false;
    }

    init();
    function htpToggleLang(btn) {
        const toTh = btn.textContent.trim() === 'Thai';
        btn.closest('.how-to-play').querySelectorAll('.htp-text').forEach(el => el.textContent = el.dataset[toTh ? 'th' : 'en']);
        btn.textContent = toTh ? 'English' : 'Thai';
    }
</script>
