<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 – Animals</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: #ff4757;
            --p2: #ffa502;
            --board: #2ecc71;
            --bg: #eafaf1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg);
            margin: 0;
            padding: 20px 10px 40px;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #1a5e2a;
            margin: 0 0 14px;
            letter-spacing: 1px;
        }

        .status-bar {
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            padding: 10px 36px;
            border-radius: 50px;
            margin-bottom: 18px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            transition: all 0.3s;
        }
        .p1-turn { color: var(--p1); border: 4px solid var(--p1); }
        .p2-turn { color: var(--p2); border: 4px solid var(--p2); }

        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--board);
            padding: 12px;
            border-radius: 20px;
            gap: 8px;
            box-shadow: 0 10px 0 #1fa855, 0 12px 30px rgba(0,0,0,0.2);
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .column-numbers {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 0 12px;
            margin-bottom: 6px;
            width: 100%;
        }

        .col-num {
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            color: #1a5e2a;
            text-align: center;
            background: white;
            border-radius: 12px;
            padding: 4px 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
            line-height: 1.2;
            transition: transform 0.15s, background 0.15s;
            cursor: pointer;
            user-select: none;
        }
        .col-num:hover {
            background: #f0fff5;
            transform: translateY(-3px);
        }
        .col-num.full {
            color: #ccc;
            background: #f0f0f0;
            cursor: not-allowed;
            transform: none;
        }

        .column {
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            cursor: pointer;
            padding: 4px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .column:hover { background: rgba(255,255,255,0.15); }

        .slot {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: #c8f7dc;
            border: 3px solid rgba(0,0,0,0.08);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.15);
        }

        .slot.red   { background: var(--p1) !important; box-shadow: 0 0 12px rgba(255,71,87,0.6), inset 0 -3px 6px rgba(0,0,0,0.2); }
        .slot.yellow{ background: var(--p2) !important; box-shadow: 0 0 12px rgba(255,165,2,0.6), inset 0 -3px 6px rgba(0,0,0,0.2); }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,20,50,0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        #q-card {
            background: white;
            padding: 36px 40px 32px;
            border-radius: 28px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            border: 6px solid var(--board);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .player-badge {
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 14px;
            color: white;
        }
        .badge-red    { background: var(--p1); }
        .badge-yellow { background: var(--p2); }

        #q-text {
            font-family: 'Nunito', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            color: #1a5e2a;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        #q-translation {
            font-size: 1.15rem;
            color: #5a9a6a;
            margin-bottom: 22px;
            min-height: 28px;
            font-style: italic;
            transition: opacity 0.3s;
        }

        .question-icon {
            margin: 10px 0;
            animation: bounce 2s infinite;
        }

        .question-icon img {
            width: 180px;
            height: 140px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #e0e0e0;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .translate-btn {
            background: none;
            border: 2px solid #aae0b4;
            color: #3a8a4a;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .translate-btn:hover { background: #eafaf1; border-color: #2ecc71; color: #1a5e2a; }

        .judge-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

        .btn {
            padding: 14px 28px;
            font-size: 1.1rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }
        .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
        .btn-yes { background: #2ecc71; color: white; }
        .btn-no  { background: #e0e0e0; color: #555; }

        /* Win overlay */
        #win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,20,50,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        #win-card {
            background: white;
            padding: 50px 60px;
            border-radius: 30px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #win-card h2 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin: 0 0 10px; }
        #win-card p  { font-size: 1.3rem; color: #555; margin-bottom: 20px; }
        .win-icons { font-size: 2rem; margin-bottom: 20px; }
        .btn-restart { background: var(--board); color: white; padding: 16px 40px; font-size: 1.2rem; }

        /* Animal icons decoration */
        .animal-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .animal-icon {
            font-size: 2.5rem;
            opacity: 0.7;
            transition: transform 0.3s, opacity 0.3s;
        }
        .animal-icon:hover {
            transform: scale(1.2) rotate(10deg);
            opacity: 1;
        }

        .difficulty-bar {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            border: 3px solid var(--board);
        }
        .diff-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            padding: 10px 28px;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            background: white;
            color: #888;
        }
        .diff-btn:hover { background: #eafaf1; }
        .diff-btn.active {
            background: var(--board);
            color: white;
        }

        .qr-sidebar {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            padding: 14px;
            border-radius: 18px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 100;
        }
        .qr-sidebar img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
        }
        .qr-sidebar p {
            margin: 8px 0 0;
            font-family: 'Fredoka One', cursive;
            font-size: 0.75rem;
            color: #1a5e2a;
        }

        @keyframes pieceDrop {
            from { transform: translateY(var(--drop-y)); }
            to   { transform: translateY(0); }
        }
        .slot.dropping {
            animation: pieceDrop 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        .board { overflow: hidden; }
        .how-to-play {
            position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
            background: white; border-radius: 20px; padding: 18px 16px; width: 170px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.14); border: 3px solid var(--board);
            z-index: 100; font-family: 'Nunito', sans-serif;
        }
        .htp-title {
            font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--board);
            text-align: center; margin-bottom: 12px; border-bottom: 2px solid var(--board); padding-bottom: 8px;
        }
        .htp-step {
            display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px;
            font-size: 0.78rem; font-weight: 700; color: #2c3e50; line-height: 1.35;
        }
        .htp-num {
            background: var(--board); color: white; border-radius: 50%;
            width: 20px; height: 20px; display: flex; align-items: center;
            justify-content: center; font-family: 'Fredoka One', cursive;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .htp-mini-board {
            display: grid; grid-template-columns: repeat(4, 14px); gap: 3px;
            background: var(--board); padding: 4px; border-radius: 6px;
            margin: 8px auto 4px; width: fit-content;
        }
        .htp-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.25); }
        .htp-dot.r { background: #ff4757; }
        .htp-dot.y { background: #ffa502; }
        .htp-legend { display: flex; gap: 8px; justify-content: center; margin-top: 10px; font-size: 0.75rem; font-weight: 800; }
        @media (max-width: 560px) {
            .slot { width: 40px; height: 40px; }
            .board { gap: 5px; padding: 8px; }
            #q-text { font-size: 1.3rem; }
            .animal-icon { font-size: 2rem; }
            .diff-btn { font-size: 0.9rem; padding: 8px 18px; }
            .qr-sidebar { position: static; transform: none; margin-top: 20px; }
            .how-to-play { display: none; }
        }
    </style>
</head>
<body>

<h1>🦁 Connect 4 – Animals</h1>

<div class="animal-icons">
    <span class="animal-icon">🐢</span>
    <span class="animal-icon">🐆</span>
    <span class="animal-icon">🦋</span>
    <span class="animal-icon">🦛</span>
    <span class="animal-icon">🐵</span>
    <span class="animal-icon">🐄</span>
    <span class="animal-icon">🦒</span>
    <span class="ani<div class="difficulty-bar">
    <button class="diff-btn active" id="btn-easy" onclick="setDifficulty('easy')">⭐ Easy — Name the Animal</button>
    <button class="diff-btn" id="btn-hard" onclick="setDifficulty('hard')">🔥 Hard — Answer a Question</button>
</div>

<!-- Custom Deck Selector -->
<div style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;">
    <select id="select-custom-deck" style="padding: 10px 15px; border-radius: 10px; border: 2px solid var(--board); font-family: 'Fredoka One', cursive; cursor: pointer; outline: none;" onchange="loadCustomDeck(this.value)">
        <option value="">🦁 Default Animals Deck</option>
        <!-- Options loaded from localStorage custom_deck_ -->
    </select>
    <button onclick="refreshCustomDecksList()" style="padding: 10px 15px; border-radius: 10px; border: none; background: var(--board); color: white; font-family: 'Fredoka One', cursive; cursor: pointer; transition: background 0.2s;">🔄 Refresh Library</button>
</div>

<div id="status" class="status-bar p1-turn">🔴 Red Player's Turn</div>

<div class="board-wrapper">
    <div class="column-numbers" id="col-nums">
        <div class="col-num" onclick="handleColumnClick(0)">1</div>
        <div class="col-num" onclick="handleColumnClick(1)">2</div>
        <div class="col-num" onclick="handleColumnClick(2)">3</div>
        <div class="col-num" onclick="handleColumnClick(3)">4</div>
        <div class="col-num" onclick="handleColumnClick(4)">5</div>
        <div class="col-num" onclick="handleColumnClick(5)">6</div>
        <div class="col-num" onclick="handleColumnClick(6)">7</div>
    </div>
    <div class="board" id="board"></div>
</div>

<!-- Question Overlay -->
<div id="overlay">
    <div id="q-card">
        <div id="player-badge" class="player-badge badge-red">🔴 Red's Question</div>
        <div id="q-text">Question goes here...</div>
        <div id="q-translation"></div>
        <div class="question-icon" id="question-icon">
            <img id="q-image" src="" alt="Animal image" style="display:none;">
            <span id="q-emoji" style="font-size: 80px; display:none;"></span>
        </div>
        <button class="translate-btn" id="translate-btn" onclick="toggleTranslation()">🇻🇳 Show Translation</button>
        <div class="judge-btns">
            <button class="btn btn-no"  onclick="handleJudge(false)">❌ Try Again</button>
            <button class="btn btn-yes" onclick="handleJudge(true)">✅ Great Answer!</button>
        </div>
    </div>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
    <div id="win-card">
        <h2 id="win-title">🎉 Red Wins!</h2>
        <p>Fantastic playing — well done!</p>
        <div class="win-icons">
            <span>🏆</span>
            <span>🦁</span>
            <span>🌟</span>
        </div>
        <button class="btn btn-restart" onclick="location.reload()">🔄 Play Again</button>
    </div>
</div>

<div class="how-to-play">
    <div class="htp-title">📖 How to Play</div>
    <div class="htp-step"><div class="htp-num">1</div><div class="htp-text" data-en="Pick a column (1–7)" data-vi="Chọn một cột (1–7)">Pick a column (1–7)</div></div>
    <div class="htp-step"><div class="htp-num">2</div><div class="htp-text" data-en="Answer correctly" data-vi="Trả lời chính xác">Answer correctly</div></div>
    <div class="htp-step"><div class="htp-num">3</div><div class="htp-text" data-en="Piece drops in!" data-vi="Quân cờ rơi xuống!">Piece drops in!</div></div>
    <div class="htp-step"><div class="htp-num">4</div><div class="htp-text" data-en="Connect 4 in a row to win!" data-vi="Kết nối 4 quân thẳng hàng để thắng!">Connect 4 in a row to win!</div></div>
    <button onclick="htpToggleLang(this)" style="margin-top:8px;width:100%;padding:5px;border-radius:10px;border:2px solid var(--board);background:white;font-family:'Fredoka One',cursive;font-size:0.8rem;color:var(--board);cursor:pointer;">🇻🇳 Vietnamese</button>
    <div class="htp-mini-board">
        <div class="htp-dot"></div><div class="htp-dot"></div><div class="htp-dot r"></div><div class="htp-dot"></div>
        <div class="htp-dot"></div><div class="htp-dot r"></div><div class="htp-dot y"></div><div class="htp-dot"></div>
        <div class="htp-dot r"></div><div class="htp-dot y"></div><div class="htp-dot y"></div><div class="htp-dot"></div>
        <div class="htp-dot r"></div><div class="htp-dot r"></div><div class="htp-dot r"></div><div class="htp-dot r"></div>
    </div>
    <div class="htp-legend"><span>🔴 Red</span><span>🟡 Yellow</span></div>
</div>

<div class="qr-sidebar">
    <img src="../overlays/teacherlewis1-overlay/public/qrcode_preply.com.png" alt="Preply QR Code">
    <p>Book a lesson!</p>
</div>

<script>
    const ROWS = 6, COLS = 7;
    let currentPlayer = 1;
    let boardState = Array(COLS).fill(null).map(() => Array(ROWS).fill(null));
    let activeCol = null;
    let translationVisible = false;
    let currentTranslation = '';
    let difficulty = 'easy';

    // ─── DIFFICULTY SELECTOR ─────────────────────────────────────────────────
    function setDifficulty(mode) {
        difficulty = mode;
        document.getElementById('btn-easy').classList.toggle('active', mode === 'easy');
        document.getElementById('btn-hard').classList.toggle('active', mode === 'hard');
    }

    // ─── ANIMAL DATA ────────────────────────────────────────────────────────

        { file: 'imgi_9_1593138872_97712.jpg',     animal: 'Worm',         animalVi: 'Giun',      emoji: '🪱', q: 'Where do worms live?',                          qVi: 'Giun sống ở đâu?', ans: 'In the soil (underground)', ansVi: 'Trong đất (dưới lòng đất)' },

        { file: 'imgi_24_1593138573_92207.jpg',    animal: 'Crocodile',    animalVi: 'Cá sấu',     emoji: '🐊', q: 'Where do crocodiles live?',                     qVi: 'Cá sấu sống ở đâu?', ans: 'In rivers, swamps, and lakes', ansVi: 'Ở sông, đầm lầy và hồ' }
    ];

    let currentAnimalsList = [...animals];
    let columnAnimals = [];

    function setupColumns() {
        const indices = currentAnimalsList.map((_, i) => i).sort(() => Math.random() - 0.5);
        columnAnimals = indices.slice(0, 7).map(idx => currentAnimalsList[idx]);
        
        const nums = document.querySelectorAll('.col-num');
        nums.forEach((el, c) => {
            el.innerHTML = `${c + 1}<br>${columnAnimals[c].emoji || '🐾'}`;
        });
    }

    // ─── LOCAL STORAGE CUSTOM DECK LOADER ─────────────────────────────────────
    function refreshCustomDecksList() {
        const select = document.getElementById('select-custom-deck');
        select.innerHTML = '<option value="">🦁 Default Animals Deck</option>';
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('custom_deck_')) {
                const name = key.replace('custom_deck_', '');
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = `📂 Custom: ${name}`;
                select.appendChild(opt);
            }
        }
    }

    function loadCustomDeck(name) {
        if (!name) {
            currentAnimalsList = [...animals];
            setupColumns();
            return;
        }
        const key = `custom_deck_${name}`;
        const data = localStorage.getItem(key);
        if (data) {
            try {
                const parsed = JSON.parse(data);
                if (parsed.length > 0) {
                    currentAnimalsList = parsed.map(q => ({
                        file: q.file || '',
                        animal: q.vocabEn,
                        animalVi: q.vocabVi,
                        emoji: q.emoji || '🐾',
                        q: q.qEn,
                        qVi: q.qVi,
                        ans: q.ansEn,
                        ansVi: q.ansVi
                    }));
                    setupColumns();
                } else {
                    alert('This custom deck is empty!');
                }
            } catch (e) {
                alert('Error loading custom deck.');
            }
        }
    }

    // ─── AUDIO ────────────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.15);
        } else {
            osc.type = 'square';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        }
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    // ─── BOARD INIT ───────────────────────────────────────────────────────────
    function init() {
        const board = document.getElementById('board');
        for (let c = 0; c < COLS; c++) {
            const colDiv = document.createElement('div');
            colDiv.className = 'column';
            colDiv.onclick = () => handleColumnClick(c);
            for (let r = 0; r < ROWS; r++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `slot-${c}-${r}`;
                colDiv.appendChild(slot);
            }
            board.appendChild(colDiv);
        }
        setupColumns();
        refreshCustomDecksList();
    }

    function updateColumnNumbers() {
        const nums = document.querySelectorAll('.col-num');
        nums.forEach((el, c) => {
            if (boardState[c].indexOf(null) === -1) {
                el.classList.add('full');
            } else {
                el.classList.remove('full');
            }
        });
    }

    function handleColumnClick(c) {
        if (boardState[c].indexOf(null) === -1) return; // column full
        activeCol = c;
        translationVisible = false;
        const a = columnAnimals[c];

        if (difficulty === 'easy') {
            document.getElementById('q-text').innerText = 'What animal is this?';
            const article = /^[aeiou]/i.test(a.animal) ? 'an' : 'a';
            currentTranslation = "It's " + article + ' ' + a.animal + ' — ' + (a.animalVi || '');
        } else {
            document.getElementById('q-text').innerText = a.q;
            currentTranslation = "Answer: " + a.ans + " (" + (a.ansVi || '') + ")\n\nQuestion: " + (a.qVi || '');
        }

        document.getElementById('q-translation').innerText = '';
        document.getElementById('translate-btn').innerText = difficulty === 'easy'
            ? '🇻🇳 Show Answer'
            : '🇻🇳 Show Answer & Translation';

        const qImg = document.getElementById('q-image');
        const qEmoji = document.getElementById('q-emoji');
        
        if (a.file) {
            qImg.src = (a.file.startsWith('http') || a.file.startsWith('connectfour.html')) ? a.file : IMG_PATH + a.file;
            qImg.style.display = 'block';
            qEmoji.style.display = 'none';
        } else if (a.emoji) {
            qEmoji.innerText = a.emoji;
            qEmoji.style.display = 'block';
            qImg.style.display = 'none';
        } else {
            qImg.style.display = 'none';
            qEmoji.style.display = 'none';
        }

        const badge = document.getElementById('player-badge');
        badge.innerText = currentPlayer === 1 ? '🔴 Red\'s Question' : '🟡 Yellow\'s Question';
        badge.className = 'player-badge ' + (currentPlayer === 1 ? 'badge-red' : 'badge-yellow');
        document.getElementById('overlay').style.display = 'flex';
    }

    function toggleTranslation() {
        translationVisible = !translationVisible;
        document.getElementById('q-translation').innerText = translationVisible ? currentTranslation : '';
        const hideLabel = difficulty === 'easy' ? '🙈 Hide Answer' : '🙈 Hide Answer & Translation';
        const showLabel = difficulty === 'easy' ? '🇻🇳 Show Answer' : '🇻🇳 Show Answer & Translation';
        document.getElementById('translate-btn').innerText = translationVisible ? hideLabel : showLabel;
    }

    function handleJudge(isCorrect) {
        document.getElementById('overlay').style.display = 'none';
        if (!isCorrect) {
            playSound('wrong');
            return;
        }
        playSound('correct');
        const r = boardState[activeCol].indexOf(null);
        boardState[activeCol][r] = currentPlayer;
        const slot = document.getElementById(`slot-${activeCol}-${r}`);
        const slotH = 74;
        slot.style.setProperty('--drop-y', `-${(ROWS - r) * slotH}px`);
        slot.className = `slot ${currentPlayer === 1 ? 'red' : 'yellow'} dropping`;
        slot.addEventListener('animationend', () => slot.classList.remove('dropping'), { once: true });
        updateColumnNumbers();

        if (checkWin(activeCol, r)) {
            setTimeout(() => showWin(currentPlayer), 300);
            return;
        }

        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateStatus();
    }

    function updateStatus() {
        const s = document.getElementById('status');
        s.innerText = currentPlayer === 1 ? '🔴 Red Player\'s Turn' : '🟡 Yellow Player\'s Turn';
        s.className = `status-bar ${currentPlayer === 1 ? 'p1-turn' : 'p2-turn'}`;
    }

    function showWin(player) {
        const title = document.getElementById('win-title');
        title.innerText = player === 1 ? '🎉 Red Wins!' : '🎉 Yellow Wins!';
        title.style.color = player === 1 ? '#ff4757' : '#ffa502';
        document.getElementById('win-overlay').style.display = 'flex';
    }

    function checkWin(c, r) {
        const p = boardState[c][r];
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (let [dc, dr] of dirs) {
            let count = 1;
            for (let i = 1; i < 4; i++) { if (boardState[c+dc*i]?.[r+dr*i] === p) count++; else break; }
            for (let i = 1; i < 4; i++) { if (boardState[c-dc*i]?.[r-dr*i] === p) count++; else break; }
            if (count >= 4) return true;
        }
        return false;
    }

    init();

    function htpToggleLang(btn) {
        const texts = btn.closest('.how-to-play').querySelectorAll('.htp-text');
        const toVi = btn.textContent.includes('Vietnamese');
        texts.forEach(el => el.textContent = el.dataset[toVi ? 'vi' : 'en']);
        btn.textContent = toVi ? '🇬🇧 English' : '🇻🇳 Vietnamese';
    }
</script>
